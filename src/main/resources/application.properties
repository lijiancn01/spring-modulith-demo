spring.application.name=inventory-demo

# 主数据源（采购/销售/库存/商品）
spring.datasource.url=jdbc:h2:mem:inventorydb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 结算数据源（独立数据库）
spring.datasource.settlement.url=jdbc:h2:mem:settlementdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.settlement.driver-class-name=org.h2.Driver
spring.datasource.settlement.username=sa
spring.datasource.settlement.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.sql.init.mode=never

# Spring Modulith 事件持久化（使用主数据源）
spring.modulith.events.jdbc.schema-initialization.enabled=true
spring.modulith.events.completion-mode=archive
spring.modulith.events.republish-outstanding-events-on-restart=true
